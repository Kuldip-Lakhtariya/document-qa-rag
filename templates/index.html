<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Document Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #171512;
    --surface: #211d18;
    --surface-2: #2a251e;
    --border: #3a332b;
    --text: #ece6dc;
    --text-muted: #9a9184;
    --accent: #c17f4f;
    --accent-hover: #d38f5c;
    --success: #7c9b7e;
    --error: #c15c4f;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 32px 20px 130px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    margin: 0;
    letter-spacing: -0.01em;
    text-align: center;
  }
  .subtitle { color: var(--text-muted); font-size: 13.5px; text-align: center; margin-top: 4px; }
  .title-rule {
    border: none; border-top: 1px solid var(--border);
    width: 64px; margin: 16px auto 24px;
  }

  /* Upload row: dropzone + upload button */
  .upload-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 10px; }
  .dropzone {
    flex: 1; display: flex; flex-direction: row; align-items: center; justify-content: center;
    gap: 10px; text-align: center; cursor: pointer;
    background: var(--surface); border: 1.5px dashed var(--border);
    border-radius: 10px; padding: 12px 16px;
    transition: border-color 0.15s, background 0.15s;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent); background: var(--surface-2);
  }
  .dropzone.has-file { border-style: solid; border-color: var(--success); }
  .dropzone svg { color: var(--text-muted); flex-shrink: 0; }
  .dropzone:hover svg, .dropzone.drag-over svg { color: var(--accent); }
  .dropzone-label { font-size: 13.5px; color: var(--text); }
  .dropzone input[type="file"] { display: none; }

  button.action {
    background: var(--accent); color: #171512; border: none;
    padding: 9px 16px; border-radius: 7px; font-weight: 600;
    cursor: pointer; font-size: 13px; white-space: nowrap; transition: background 0.15s;
    flex-shrink: 0;
  }
  button.action:hover:not(:disabled) { background: var(--accent-hover); }
  button.action:disabled { background: #4a4038; color: #8a8177; cursor: not-allowed; }

  .doc-status { font-size: 12.5px; margin-bottom: 22px; display: flex; align-items: center; gap: 6px; }
  .doc-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
  .doc-status.ready { color: var(--success); }
  .doc-status.ready .dot { background: var(--success); }
  .doc-status.error { color: var(--error); }
  .doc-status.error .dot { background: var(--error); }

  /* Chat log */
  #chat-log { display: flex; flex-direction: column; gap: 20px; }
  .msg-row { display: flex; flex-direction: column; }
  .msg-row.question { align-items: flex-end; }

  .msg.question {
    max-width: 82%; background: var(--surface-2); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 10px 10px 2px 10px; font-size: 14.5px; line-height: 1.5;
  }

  /* Signature: answers are plain text with a left accent rule — a margin
     annotation, not a chat bubble. Distinguishes assistant text from the
     boxed user question without adding another background color. */
  .msg.answer {
    width: 100%; border-left: 2px solid var(--accent); padding-left: 14px;
    font-size: 14.5px; line-height: 1.6;
  }
  .msg.answer.loading { color: var(--text-muted); font-style: italic; border-left-color: var(--border); }
  .msg.answer.error { color: var(--error); border-left-color: var(--error); }

  /* Feedback row under each completed answer */
  .feedback-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-left: 16px; }
  .fb-btn {
    background: none; border: none; cursor: pointer; padding: 3px;
    color: var(--text-muted); display: flex; align-items: center; transition: color 0.15s;
  }
  .fb-btn:hover { color: var(--text); }
  .fb-btn.selected.up { color: var(--success); }
  .fb-btn.selected.down { color: var(--error); }
  .fb-btn:disabled { cursor: default; opacity: 0.6; }
  .fb-note { font-size: 12px; color: var(--text-muted); }

  .comment-box { padding-left: 16px; margin-top: 8px; display: flex; gap: 8px; }
  .comment-box textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; min-height: 36px;
  }
  .comment-box button {
    background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 0 12px; font-size: 12.5px; cursor: pointer;
  }

  /* Fixed input bar */
  .ask-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 20px 20px 22px; display: flex; justify-content: center;
  }
  .ask-bar-inner {
    display: flex; gap: 8px; width: 100%; max-width: 700px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
    padding: 6px 6px 6px 16px;
  }
  .ask-bar input[type="text"] {
    flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; outline: none;
  }
  .ask-bar input[type="text"]::placeholder { color: var(--text-muted); }
  .send-btn {
    background: var(--accent); border: none; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:disabled { background: #4a4038; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Document Q&A</h1>
<div class="subtitle">Upload a PDF once, then ask as many questions as you like.</div>
<hr class="title-rule">

<div class="upload-row">
  <label class="dropzone" id="dropzone" for="pdf-input">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="17 8 12 3 7 8"></polyline>
      <line x1="12" y1="3" x2="12" y2="15"></line>
    </svg>
    <span class="dropzone-label" id="dropzone-label">Drop a PDF here or click to browse</span>
    <input type="file" id="pdf-input" accept="application/pdf">
  </label>
  <button class="action" id="upload-btn" onclick="uploadPdf()">Upload</button>
</div>
<div id="upload-status" class="doc-status"><span class="dot"></span><span class="status-text">No document uploaded yet.</span></div>

<div id="chat-log"></div>

<div class="ask-bar">
  <div class="ask-bar-inner">
    <input type="text" id="question-input" placeholder="Ask a question about the document..."
           onkeydown="if(event.key === 'Enter') askQuestion()">
    <button class="send-btn" id="ask-btn" onclick="askQuestion()" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#171512" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="6 11 12 5 18 11"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
let documentReady = false;

const dropzone = document.getElementById('dropzone');
const dropzoneLabel = document.getElementById('dropzone-label');
const pdfInput = document.getElementById('pdf-input');

function showSelectedFile(file) {
  dropzoneLabel.textContent = file.name;
  dropzone.classList.add('has-file');
}

pdfInput.addEventListener('change', () => {
  if (pdfInput.files.length) showSelectedFile(pdfInput.files[0]);
});

['dragover', 'dragenter'].forEach(evt =>
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  })
);

['dragleave', 'drop'].forEach(evt =>
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
  })
);

dropzone.addEventListener('drop', (e) => {
  const file = e.dataTransfer.files[0];
  if (file) {
    pdfInput.files = e.dataTransfer.files;
    showSelectedFile(file);
  }
});

function setStatus(el, text, cls) {
  el.className = `doc-status ${cls}`.trim();
  el.innerHTML = `<span class="dot"></span><span class="status-text">${text}</span>`;
}

async function uploadPdf() {
  const fileInput = document.getElementById('pdf-input');
  const status = document.getElementById('upload-status');
  const btn = document.getElementById('upload-btn');

  if (!fileInput.files.length) {
    setStatus(status, "Choose a PDF first.", "error");
    return;
  }

  const formData = new FormData();
  formData.append('pdf', fileInput.files[0]);

  btn.disabled = true;
  setStatus(status, "Processing PDF… this may take a moment.", "");

  try {
    const response = await fetch('/upload', { method: 'POST', body: formData });
    const result = await response.json();
    if (!response.ok) throw new Error(result.error || "Upload failed");

    documentReady = true;
    setStatus(status, "Ready — ask away below.", "ready");
  } catch (err) {
    setStatus(status, err.message, "error");
  } finally {
    btn.disabled = false;
  }
}

function iconThumb(direction) {
  const rotate = direction === "down" ? ' style="transform: scaleY(-1)"' : "";
  return `<svg${rotate} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"></path>
    <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
  </svg>`;
}

function appendMessage(role, text, extraClass = "") {
  const log = document.getElementById('chat-log');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`.trim();
  const div = document.createElement('div');
  div.className = `msg ${role} ${extraClass}`.trim();
  div.textContent = text;
  row.appendChild(div);
  log.appendChild(row);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  return { row, div };
}

function attachFeedback(answerRow, question, answerTextRef) {
  const feedbackRow = document.createElement('div');
  feedbackRow.className = 'feedback-row';
  feedbackRow.innerHTML = `
    <button class="fb-btn up" title="Good answer">${iconThumb("up")}</button>
    <button class="fb-btn down" title="Needs improvement">${iconThumb("down")}</button>
    <span class="fb-note"></span>
  `;
  answerRow.appendChild(feedbackRow);

  const upBtn = feedbackRow.querySelector('.up');
  const downBtn = feedbackRow.querySelector('.down');
  const note = feedbackRow.querySelector('.fb-note');

  function lockButtons(selectedCls) {
    upBtn.disabled = true;
    downBtn.disabled = true;
    feedbackRow.querySelector(`.${selectedCls}`).classList.add('selected', selectedCls);
  }

  upBtn.onclick = async () => {
    lockButtons('up');
    note.textContent = "Thanks for the feedback.";
    await fetch('/feedback', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, answer: answerTextRef.text, rating: 'up' })
    });
  };

  downBtn.onclick = () => {
    lockButtons('down');
    note.textContent = "Regenerating a better answer…";

    const commentBox = document.createElement('div');
    commentBox.className = 'comment-box';
    commentBox.innerHTML = `
      <textarea placeholder="Optional: what was wrong with this answer?"></textarea>
      <button>Send</button>
    `;
    answerRow.appendChild(commentBox);
    const textarea = commentBox.querySelector('textarea');
    const sendBtn = commentBox.querySelector('button');

    async function submitFeedback() {
      commentBox.remove();
      const comment = textarea.value.trim();

      try {
        const response = await fetch('/feedback', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, answer: answerTextRef.text, rating: 'down', comment })
        });
        const result = await response.json();

        if (result.regenerated && result.answer) {
          answerTextRef.text = result.answer;
          answerRow.querySelector('.msg.answer').textContent = result.answer;
          note.textContent = "Answer updated based on your feedback.";
        } else {
          note.textContent = "Feedback logged. Couldn't regenerate right now.";
        }
      } catch {
        note.textContent = "Feedback logged, but regeneration failed.";
      }
    }

    sendBtn.onclick = submitFeedback;
  };
}

async function askQuestion() {
  const input = document.getElementById('question-input');
  const btn = document.getElementById('ask-btn');
  const question = input.value.trim();
  if (!question) return;

  if (!documentReady) {
    appendMessage('answer', 'Upload a PDF first before asking questions.', 'error');
    return;
  }

  appendMessage('question', question);
  input.value = "";
  btn.disabled = true;

  const { row: answerRow, div: loadingDiv } = appendMessage('answer', 'Thinking…', 'loading');

  try {
    const response = await fetch('/ask', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const result = await response.json();
    if (!response.ok) throw new Error(result.error || "Something went wrong");

    loadingDiv.className = "msg answer";
    loadingDiv.textContent = result.answer;

    const answerTextRef = { text: result.answer };
    attachFeedback(answerRow, question, answerTextRef);
  } catch (err) {
    loadingDiv.className = "msg answer error";
    loadingDiv.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
